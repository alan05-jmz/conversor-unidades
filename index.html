<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Unidades</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="contenedor">
    <h1>Conversor de Unidades</h1>

    <label for="valor">Ingresa un valor:</label>
    <input type="number" id="valor" placeholder="Ej. 100">

    <label for="conversion">Selecciona la conversión:</label>
    <select id="conversion">
      <option value="m-km">Metros a Kilómetros</option>
      <option value="km-m">Kilómetros a Metros</option>
      <option value="m-mi">Metros a Millas</option>
      <option value="mi-m">Millas a Metros</option>

      <option value="g-kg">Gramos a Kilogramos</option>
      <option value="kg-g">Kilogramos a Gramos</option>
      <option value="g-lb">Gramos a Libras</option>
      <option value="lb-g">Libras a Gramos</option>

      <option value="c-f">Celsius a Fahrenheit</option>
      <option value="f-c">Fahrenheit a Celsius</option>
      <option value="c-k">Celsius a Kelvin</option>
      <option value="k-c">Kelvin a Celsius</option>
    </select>

    <button onclick="convertir()">Convertir</button>

    <h2 id="resultado">Resultado: </h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
